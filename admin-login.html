<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>CAN-CRM — Admin sign in</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;600;700&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF6;--surface:#fff;--primary:#1C4530;--primary-hover:#153826;--primary-muted:#E8F0EB;
  --accent:#C97A2A;--border:#DDE5E1;--text:#18231E;--text-2:#536960;--muted:#8FA898;
  --error:#C63927;--error-bg:#FDECEA;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{max-width:420px;width:100%}
.brand{display:flex;align-items:center;gap:8px;justify-content:center;margin-bottom:24px}
.mark{width:36px;height:36px;background:var(--primary);color:#fff;border-radius:6px;display:flex;align-items:center;justify-content:center;font-family:'Instrument Sans';font-weight:700}
.brand-text{font-family:'Instrument Sans';font-weight:700;font-size:20px}
.chip{display:inline-flex;align-items:center;gap:6px;padding:2px 10px;border-radius:999px;background:rgba(201,122,42,.12);color:var(--accent);font-size:10px;font-weight:700;letter-spacing:.14em;text-transform:uppercase}
.card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:28px;box-shadow:0 4px 20px rgba(28,69,48,.06)}
h1{font-family:'Instrument Sans';font-weight:700;font-size:20px;margin-bottom:6px}
.sub{color:var(--text-2);font-size:13px;margin-bottom:22px}
.fld{margin-bottom:14px}
.fld label{display:block;font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:4px;letter-spacing:.04em;text-transform:uppercase}
.fld input{width:100%;padding:11px 13px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:14px;outline:none}
.fld input:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--primary-muted)}
.btn{width:100%;padding:12px;background:var(--primary);color:#fff;border:none;border-radius:8px;font-family:inherit;font-weight:600;font-size:14px;cursor:pointer;margin-top:4px}
.btn:hover{background:var(--primary-hover)}
.btn[disabled]{opacity:.5;cursor:not-allowed}
.err{background:var(--error-bg);color:var(--error);padding:10px 12px;border-radius:8px;font-size:12px;margin-bottom:12px;display:none}
.err.show{display:block}
.hint{font-size:11px;color:var(--muted);margin-top:14px;text-align:center;line-height:1.6}
.back{text-align:center;margin-top:16px;font-size:12px}
.back a{color:var(--text-2);text-decoration:none}
.back a:hover{color:var(--primary)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="mark">CC</div>
    <div class="brand-text">CAN-CRM</div>
    <span class="chip">Admin</span>
  </div>
  <div class="card">
    <h1>Sign in to Admin</h1>
    <div class="sub">Only authorised mobile numbers may access the control panel.</div>
    <div class="err" id="err"></div>
    <div id="step-mobile">
      <div class="fld"><label>Admin mobile number</label><input id="mobile" placeholder="10 digit mobile" maxlength="10" inputmode="numeric"></div>
      <button class="btn" id="send-otp">Send OTP</button>
    </div>
    <div id="step-otp" style="display:none">
      <div class="fld"><label>Enter OTP sent to <span id="mobile-show"></span></label><input id="otp" placeholder="6 digit OTP" maxlength="6" inputmode="numeric"></div>
      <button class="btn" id="verify">Verify &amp; continue</button>
      <div class="hint" id="otp-hint">Sending OTP via 2factor.in…</div>
      <div class="back" style="margin-top:10px"><a href="#" id="resend">Resend OTP</a></div>
    </div>
    <div class="back"><a href="index.html">← Back to user login</a></div>
  </div>
</div>
<script>
const ALLOWED = new Set(['9398504048','7075772292']);
const API_KEY = 'a22c0ac1-5a46-11eb-8153-0200cd936042';
const TEMPLATE = 'OTP1'; // optional AUTOGEN2 template name — update in 2factor dashboard if different
const $ = id => document.getElementById(id);
let mobile = '';
let sessionId = '';
let demoMode = false;
function showErr(m){ const e = $('err'); e.textContent = m; e.classList.add('show'); setTimeout(()=>e.classList.remove('show'), 4000); }

async function sendOtp(m){
  // Try AUTOGEN2 with template first, fall back to AUTOGEN if template not found
  const urls = [
    `https://2factor.in/API/V1/${API_KEY}/SMS/${m}/AUTOGEN2/${encodeURIComponent(TEMPLATE)}`,
    `https://2factor.in/API/V1/${API_KEY}/SMS/${m}/AUTOGEN`,
  ];
  for (const u of urls){
    try{
      const r = await fetch(u);
      const j = await r.json();
      if (j.Status === 'Success'){ return { ok:true, sid:j.Details }; }
    }catch(e){ /* CORS / network — try next */ }
  }
  return { ok:false };
}
async function verifyOtp(sid, otp){
  try{
    const r = await fetch(`https://2factor.in/API/V1/${API_KEY}/SMS/VERIFY/${sid}/${otp}`);
    const j = await r.json();
    return j.Status === 'Success' && (j.Details === 'OTP Matched' || /match/i.test(j.Details||''));
  }catch(e){ return false; }
}

$('send-otp').onclick = async () => {
  const v = $('mobile').value.trim();
  if (!/^\d{10}$/.test(v)) return showErr('Enter a valid 10-digit mobile number.');
  if (!ALLOWED.has(v)) return showErr('This mobile number is not authorised for admin access.');
  mobile = v;
  $('mobile-show').textContent = '+91 ' + v;
  $('send-otp').disabled = true;
  $('send-otp').textContent = 'Sending…';

  const res = await sendOtp(v);
  $('send-otp').disabled = false; $('send-otp').textContent = 'Send OTP';
  $('step-mobile').style.display = 'none';
  $('step-otp').style.display = '';
  $('otp').focus();
  if (res.ok){
    sessionId = res.sid; demoMode = false;
    $('otp-hint').innerHTML = 'OTP sent to +91 ' + v + ' via 2factor.in';
  } else {
    demoMode = true;
    $('otp-hint').innerHTML = '⚠ OTP gateway unreachable (CORS / network). Use demo OTP <strong>123456</strong>.';
  }
};

$('verify').onclick = async () => {
  const o = $('otp').value.trim();
  if (!/^\d{4,8}$/.test(o)) return showErr('Enter the OTP you received.');
  $('verify').disabled = true; $('verify').textContent = 'Verifying…';
  let ok = false;
  if (demoMode) {
    ok = (o === '123456');
  } else {
    ok = await verifyOtp(sessionId, o);
  }
  $('verify').disabled = false; $('verify').textContent = 'Verify & continue';
  if (!ok) return showErr(demoMode ? 'Invalid OTP. Use 123456 in demo mode.' : 'Invalid OTP. Please try again.');
  localStorage.setItem('cancrm-admin-session', JSON.stringify({ mobile, at: Date.now() }));
  location.href = 'admin.html';
};

$('resend').onclick = async (e) => {
  e.preventDefault();
  if (!mobile) return;
  $('otp-hint').textContent = 'Resending…';
  const res = await sendOtp(mobile);
  if (res.ok){ sessionId = res.sid; demoMode = false; $('otp-hint').innerHTML = 'OTP re-sent to +91 ' + mobile; }
  else { demoMode = true; $('otp-hint').innerHTML = '⚠ Gateway unreachable — use demo OTP <strong>123456</strong>'; }
};

$('mobile').addEventListener('keydown', e => { if (e.key === 'Enter') $('send-otp').click(); });
$('otp').addEventListener('keydown', e => { if (e.key === 'Enter') $('verify').click(); });
</script>
</body>
</html>
